<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>Error</title>
</h:head>
<h:body>
    <p:panel header="Error">
        <h:outputText value="#{errorMsg}" />
        <br/><br/>
        <p:accordionPanel rendered="#{not empty stackTrace}">
            <p:tab title="Stack Trace">
                <h:outputText value="#{stackTrace}" style="white-space: pre-wrap;" />
            </p:tab>
        </p:accordionPanel>
    </p:panel>
</h:body>
</html>
